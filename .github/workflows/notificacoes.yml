name: Notificações The Stryx

on:
  schedule:
    # Roda a cada 15 minutos para processar sugestões novas
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  notificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .github/scripts/package.json

      - name: Instalar dependências
        run: npm install
        working-directory: .github/scripts

      - name: Processar fila de notificações
        run: node enviar-sugestoes.js
        working-directory: .github/scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_STRYX: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STRYX }}
